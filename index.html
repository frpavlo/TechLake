<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-top">
        <a class="header-top-link" href="https://web.telegram.org/a/">
          <i class="ti ti-send"> </i>
        </a>
        <a class="header-top-link" href="https://www.instagram.com/">
          <i class="ti ti-brand-instagram"></i>
        </a>
        <a class="header-top-link" href="https://x.com/">
          <i class="ti ti-brand-twitter"></i>
        </a>
      </div>
      <div class="header-bottom">
        <p class="logo">
          Tech<span>Lake<i class="ti ti-sailboat"></i></span>
        </p>
        <div class="header-bottom-container">
          <ul class="header-list">
            <li class="header-bottom-item">
              <a class="header-bottom-link">Home</a>
            </li>
            <li class="header-bottom-item">
              <a class="header-bottom-link">About</a>
            </li>
            <li class="header-bottom-item">
              <a class="header-bottom-link">Catalog</a>
            </li>
            <li class="header-bottom-item">
              <a class="header-bottom-link">Blogs</a>
            </li>
            <li class="header-bottom-item">
              <a class="header-bottom-link">Contact Us</a>
            </li>
          </ul>
          <form class="d-flex" role="search">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search"
              aria-label="Search"
            />
            <button class="btn btn-outline-success" type="submit">
              Search
            </button>
          </form>
        </div>
      </div>
    </header>
    <section class="hero">
      <div class="container">
        <img src="img/apple-iphone-x-pictures-5.png" />
        <div class="hero-container">
          <h1 class="hero-title">Lorem Ipsum Is </br>Simply Text Dummy</h1>
          <button type="button" class="btn btn-primary">Primary</button>
        </div>
      </div>
    </section>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
